global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway:8080"]
        labels:
          app: gateway-app
          component: gateway
          env: local

  - job_name: audio-node
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["audio-node:8080"]
        labels:
          app: audio-node-app
          component: audio-node
          env: local

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          component: redis
          env: local

  - job_name: rabbitmq
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15692"]
        labels:
          component: rabbitmq
          env: local

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
        labels:
          component: prometheus
          env: local

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets: ["loki:3100"]
        labels:
          component: loki
          env: local

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]
        labels:
          component: alloy
          env: local
