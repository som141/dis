groups:
  - name: discord-bot-app
    rules:
      - alert: GatewayDown
        expr: up{job="gateway"} == 0
        for: 1m
        labels:
          severity: critical
          service: gateway
        annotations:
          summary: "gateway is not responding"
          description: "gateway-app /actuator/prometheus scrape has failed for more than 1 minute."

      - alert: AudioNodeDown
        expr: up{job="audio-node"} == 0
        for: 1m
        labels:
          severity: critical
          service: audio-node
        annotations:
          summary: "audio-node is not responding"
          description: "audio-node-app /actuator/prometheus scrape has failed for more than 1 minute."

      - alert: StockNodeDown
        expr: up{job="stock-node"} == 0
        for: 1m
        labels:
          severity: critical
          service: stock-node
        annotations:
          summary: "stock-node is not responding"
          description: "stock-node-app /actuator/prometheus scrape has failed for more than 1 minute."

      - alert: AppHighJvmHeapUsage
        expr: |
          100 * sum by(job) (jvm_memory_used_bytes{area="heap", job=~"gateway|audio-node|stock-node"})
          /
          sum by(job) (jvm_memory_max_bytes{area="heap", job=~"gateway|audio-node|stock-node"})
          > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} JVM heap usage is high"
          description: "{{ $labels.job }} heap usage has been above 85% for more than 10 minutes."

      - alert: ApplicationErrorLogsDetected
        expr: sum by(job) (rate(logback_events_total{job=~"gateway|audio-node|stock-node", level="error"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} error logs detected"
          description: "{{ $labels.job }} has emitted error logs during the last 5 minutes."

  - name: discord-bot-stock
    rules:
      - alert: StockQuoteRefreshStalled
        expr: increase(stock_quote_refresh_success_total{provider="finnhub"}[2m]) == 0
        for: 2m
        labels:
          severity: warning
          service: stock-node
        annotations:
          summary: "Finnhub quote refresh is stalled"
          description: "No successful Finnhub quote refresh has been observed for more than 2 minutes."

      - alert: StockQuoteRefreshFailuresHigh
        expr: increase(stock_quote_refresh_failures_total{provider="finnhub"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: stock-node
        annotations:
          summary: "Finnhub quote refresh failures are high"
          description: "Finnhub quote refresh failures exceeded 10 events during the last 5 minutes."

      - alert: StockQuoteCacheNotReady
        expr: stock_quote_cache_ready < stock_quote_cache_expected
        for: 2m
        labels:
          severity: warning
          service: stock-node
        annotations:
          summary: "stock quote cache is not fully ready"
          description: "Redis quote cache has fewer ready quotes than the configured watchlist."

      - alert: StockQuoteCacheStale
        expr: stock_quote_cache_oldest_age > 45
        for: 2m
        labels:
          severity: warning
          service: stock-node
        annotations:
          summary: "stock quote cache is stale"
          description: "The oldest cached quote is older than the 45 second trade freshness threshold."

      - alert: StockTradeRejectionsHigh
        expr: increase(stock_trade_rejections_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          service: stock-node
        annotations:
          summary: "stock trade rejections are high"
          description: "Stock trade rejections exceeded 10 events during the last 5 minutes."

  - name: discord-bot-infra
    rules:
      - alert: RedisExporterDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "redis-exporter is not responding"
          description: "Redis metrics scrape has failed for more than 1 minute."

      - alert: PostgresExporterDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "postgres-exporter is not responding"
          description: "PostgreSQL metrics scrape has failed for more than 1 minute."

      - alert: PostgresDown
        expr: pg_up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: postgres
        annotations:
          summary: "PostgreSQL is not responding"
          description: "postgres-exporter cannot connect to PostgreSQL."

      - alert: PostgresConnectionsHigh
        expr: sum(pg_stat_activity_count{job="postgres-exporter"}) > 80
        for: 10m
        labels:
          severity: warning
          service: postgres
        annotations:
          summary: "PostgreSQL connection count is high"
          description: "PostgreSQL active connection count has exceeded 80 for more than 10 minutes."

      - alert: RabbitMqExporterDown
        expr: up{job="rabbitmq"} == 0
        for: 1m
        labels:
          severity: critical
          service: rabbitmq
        annotations:
          summary: "rabbitmq exporter is not responding"
          description: "RabbitMQ metrics endpoint scrape has failed for more than 1 minute."

      - alert: RabbitMqConsumerMissing
        expr: rabbitmq_consumers{job="rabbitmq"} < 1
        for: 5m
        labels:
          severity: warning
          service: rabbitmq
        annotations:
          summary: "RabbitMQ consumer is missing"
          description: "A command queue has had zero consumers for more than 5 minutes."

      - alert: RabbitMqQueueBacklog
        expr: sum(rabbitmq_queue_messages_ready{job="rabbitmq"}) > 20
        for: 10m
        labels:
          severity: warning
          service: rabbitmq
        annotations:
          summary: "RabbitMQ ready queue backlog is high"
          description: "Ready messages have exceeded 20 for more than 10 minutes."

      - alert: RabbitMqUnackedBacklog
        expr: sum(rabbitmq_queue_messages_unacked{job="rabbitmq"}) > 20
        for: 10m
        labels:
          severity: warning
          service: rabbitmq
        annotations:
          summary: "RabbitMQ unacked backlog is high"
          description: "Unacked messages have exceeded 20 for more than 10 minutes."
