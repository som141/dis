groups:
  - name: discord-bot-app
    rules:
      - alert: GatewayDown
        expr: up{job="gateway"} == 0
        for: 1m
        labels:
          severity: critical
          service: gateway
        annotations:
          summary: "gateway 가 응답하지 않습니다"
          description: "gateway-app 의 /actuator/prometheus scrape 가 1분 이상 실패했습니다."

      - alert: AudioNodeDown
        expr: up{job="audio-node"} == 0
        for: 1m
        labels:
          severity: critical
          service: audio-node
        annotations:
          summary: "audio-node 가 응답하지 않습니다"
          description: "audio-node-app 의 /actuator/prometheus scrape 가 1분 이상 실패했습니다."

      - alert: AppHighJvmHeapUsage
        expr: |
          100 * sum by(job) (jvm_memory_used_bytes{area="heap", job=~"gateway|audio-node"})
          /
          sum by(job) (jvm_memory_max_bytes{area="heap", job=~"gateway|audio-node"})
          > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} JVM heap 사용률이 높습니다"
          description: "{{ $labels.job }} heap 사용률이 10분 이상 85%를 초과했습니다."

      - alert: ApplicationErrorLogsDetected
        expr: sum by(job) (rate(logback_events_total{job=~"gateway|audio-node", level="error"}[5m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.job }} 에 error 로그가 발생 중입니다"
          description: "{{ $labels.job }} 에서 최근 5분 기준 error 로그가 계속 발생하고 있습니다."

  - name: discord-bot-infra
    rules:
      - alert: RedisExporterDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: redis
        annotations:
          summary: "redis-exporter 가 응답하지 않습니다"
          description: "Redis 메트릭 scrape 가 1분 이상 실패했습니다."

      - alert: RabbitMqExporterDown
        expr: up{job="rabbitmq"} == 0
        for: 1m
        labels:
          severity: critical
          service: rabbitmq
        annotations:
          summary: "rabbitmq exporter 가 응답하지 않습니다"
          description: "RabbitMQ metrics endpoint scrape 가 1분 이상 실패했습니다."

      - alert: RabbitMqConsumerMissing
        expr: rabbitmq_consumers{job="rabbitmq"} < 1
        for: 5m
        labels:
          severity: warning
          service: rabbitmq
        annotations:
          summary: "RabbitMQ consumer 가 없습니다"
          description: "command queue 를 소비하는 consumer 수가 5분 이상 0 입니다."

      - alert: RabbitMqQueueBacklog
        expr: sum(rabbitmq_queue_messages_ready{job="rabbitmq"}) > 20
        for: 10m
        labels:
          severity: warning
          service: rabbitmq
        annotations:
          summary: "RabbitMQ ready queue 적체가 증가했습니다"
          description: "ready 메시지 수가 10분 이상 20개를 초과했습니다."

      - alert: RabbitMqUnackedBacklog
        expr: sum(rabbitmq_queue_messages_unacked{job="rabbitmq"}) > 20
        for: 10m
        labels:
          severity: warning
          service: rabbitmq
        annotations:
          summary: "RabbitMQ unacked 메시지가 누적되고 있습니다"
          description: "ack 되지 않은 메시지가 10분 이상 20개를 초과했습니다."
