services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE_NAME:-discord-bot}:${APP_IMAGE_TAG:-local}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: gateway
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_DEV_GUILD_ID: ${DISCORD_DEV_GUILD_ID:-}
      YOUTUBE_REFRESH_TOKEN: ${YOUTUBE_REFRESH_TOKEN:-}
      YOUTUBE_OAUTH_INIT: ${YOUTUBE_OAUTH_INIT:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      APP_NODE_NAME: gateway-1
      HEALTH_PORT: 8080
    ports:
      - "8081:8080"
    restart: unless-stopped

  audio-node:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE_NAME:-discord-bot}:${APP_IMAGE_TAG:-local}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: audio-node
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_DEV_GUILD_ID: ${DISCORD_DEV_GUILD_ID:-}
      YOUTUBE_REFRESH_TOKEN: ${YOUTUBE_REFRESH_TOKEN:-}
      YOUTUBE_OAUTH_INIT: ${YOUTUBE_OAUTH_INIT:-false}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      APP_NODE_NAME: audio-node-1
      HEALTH_PORT: 8080
    ports:
      - "8082:8080"
    restart: unless-stopped

volumes:
  redis-data:
  rabbitmq-data:
