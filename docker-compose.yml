services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    command:
      - /bin/sh
      - -ec
      - |
        rabbitmq-plugins enable --offline rabbitmq_prometheus
        exec rabbitmq-server
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stock}
      POSTGRES_USER: ${POSTGRES_USER:-stock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stock}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stock} -d ${POSTGRES_DB:-stock}"]
      interval: 5s
      timeout: 5s
      retries: 20

  gateway:
    build:
      context: .
      dockerfile: apps/gateway-app/Dockerfile
    image: ${GATEWAY_IMAGE_NAME:-discord-gateway}:${GATEWAY_IMAGE_TAG:-local}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ""
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_DEV_GUILD_ID: ${DISCORD_DEV_GUILD_ID:-}
      YOUTUBE_REFRESH_TOKEN: ${YOUTUBE_REFRESH_TOKEN:-}
      YOUTUBE_OAUTH_INIT: ${YOUTUBE_OAUTH_INIT:-false}
      YOUTUBE_PO_TOKEN: ${YOUTUBE_PO_TOKEN:-}
      YOUTUBE_VISITOR_DATA: ${YOUTUBE_VISITOR_DATA:-}
      YOUTUBE_REMOTE_CIPHER_URL: ${YOUTUBE_REMOTE_CIPHER_URL:-}
      YOUTUBE_REMOTE_CIPHER_PASSWORD: ${YOUTUBE_REMOTE_CIPHER_PASSWORD:-}
      YOUTUBE_REMOTE_CIPHER_USER_AGENT: ${YOUTUBE_REMOTE_CIPHER_USER_AGENT:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      APP_NODE_NAME: gateway-1
      HEALTH_PORT: 8080
    ports:
      - "8081:8080"
    restart: unless-stopped

  audio-node:
    build:
      context: .
      dockerfile: apps/audio-node-app/Dockerfile
    image: ${AUDIO_NODE_IMAGE_NAME:-discord-audio-node}:${AUDIO_NODE_IMAGE_TAG:-local}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ""
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_DEV_GUILD_ID: ${DISCORD_DEV_GUILD_ID:-}
      YOUTUBE_REFRESH_TOKEN: ${YOUTUBE_REFRESH_TOKEN:-}
      YOUTUBE_OAUTH_INIT: ${YOUTUBE_OAUTH_INIT:-false}
      YOUTUBE_PO_TOKEN: ${YOUTUBE_PO_TOKEN:-}
      YOUTUBE_VISITOR_DATA: ${YOUTUBE_VISITOR_DATA:-}
      YOUTUBE_REMOTE_CIPHER_URL: ${YOUTUBE_REMOTE_CIPHER_URL:-}
      YOUTUBE_REMOTE_CIPHER_PASSWORD: ${YOUTUBE_REMOTE_CIPHER_PASSWORD:-}
      YOUTUBE_REMOTE_CIPHER_USER_AGENT: ${YOUTUBE_REMOTE_CIPHER_USER_AGENT:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      APP_NODE_NAME: audio-node-1
      HEALTH_PORT: 8080
    ports:
      - "8082:8080"
    restart: unless-stopped

  stock-node:
    build:
      context: .
      dockerfile: apps/stock-node-app/Dockerfile
    image: ${STOCK_NODE_IMAGE_NAME:-discord-stock-node}:${STOCK_NODE_IMAGE_TAG:-local}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ""
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-stock}
      POSTGRES_USER: ${POSTGRES_USER:-stock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stock}
      STOCK_QUOTE_PROVIDER: ${STOCK_QUOTE_PROVIDER:-mock}
      STOCK_QUOTE_CACHE_TTL: ${STOCK_QUOTE_CACHE_TTL:-60s}
      STOCK_QUOTE_FRESHNESS: ${STOCK_QUOTE_FRESHNESS:-45s}
      STOCK_QUOTE_TRADE_FRESHNESS: ${STOCK_QUOTE_TRADE_FRESHNESS:-45s}
      STOCK_PROVIDER_PER_MINUTE_LIMIT: ${STOCK_PROVIDER_PER_MINUTE_LIMIT:-60}
      STOCK_PROVIDER_PER_DAY_LIMIT: ${STOCK_PROVIDER_PER_DAY_LIMIT:-100000}
      STOCK_MARKET_DATA_ENABLED: ${STOCK_MARKET_DATA_ENABLED:-true}
      STOCK_MARKET: ${STOCK_MARKET:-US}
      STOCK_MARKET_REFRESH_DELAY_MS: ${STOCK_MARKET_REFRESH_DELAY_MS:-20000}
      STOCK_TOP_RANK_LIMIT: ${STOCK_TOP_RANK_LIMIT:-10}
      FINNHUB_BASE_URL: ${FINNHUB_BASE_URL:-https://finnhub.io/api/v1}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      APP_NODE_NAME: stock-node-1
      HEALTH_PORT: 8080
    ports:
      - "8083:8080"
    restart: unless-stopped

  prometheus:
    profiles: ["observability"]
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:latest}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./ops/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      gateway:
        condition: service_started
      audio-node:
        condition: service_started
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  loki:
    profiles: ["observability"]
    image: ${LOKI_IMAGE:-grafana/loki:latest}
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - ./ops/observability/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  alloy:
    profiles: ["observability"]
    image: ${ALLOY_IMAGE:-grafana/alloy:latest}
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./ops/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - alloy-data:/var/lib/alloy/data
    ports:
      - "12345:12345"
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  redis-exporter:
    profiles: ["observability"]
    image: ${REDIS_EXPORTER_IMAGE:-oliver006/redis_exporter:latest}
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    profiles: ["observability"]
    image: ${GRAFANA_IMAGE:-grafana/grafana:latest}
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS_ENABLED:-false}
      GRAFANA_ALERT_DEFAULT_RECEIVER: ${GRAFANA_ALERT_DEFAULT_RECEIVER:-observability-noop}
      GRAFANA_ALERT_NOOP_WEBHOOK_URL: ${GRAFANA_ALERT_NOOP_WEBHOOK_URL:-http://127.0.0.1:9/disabled}
      GRAFANA_ALERT_DISCORD_WEBHOOK_URL: ${GRAFANA_ALERT_DISCORD_WEBHOOK_URL:-https://example.invalid/discord-webhook}
      GRAFANA_ALERT_DISCORD_AVATAR_URL: ${GRAFANA_ALERT_DISCORD_AVATAR_URL:-}
      GRAFANA_ALERT_DISCORD_USE_USERNAME: ${GRAFANA_ALERT_DISCORD_USE_USERNAME:-true}
    volumes:
      - ./ops/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped

volumes:
  redis-data:
  rabbitmq-data:
  postgres-data:
  prometheus-data:
  loki-data:
  grafana-data:
  alloy-data:
