name: Deploy Bot

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dis-deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      GATEWAY_IMAGE_NAME: discord-gateway
      AUDIO_NODE_IMAGE_NAME: discord-audio-node
      STOCK_NODE_IMAGE_NAME: discord-stock-node
      COMPOSE_PROJECT_NAME: discord-bot
      DEPLOY_DIR: /home/ubuntu/dis-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean compileTestJava bootJarAll --no-daemon

      - name: Build Docker images
        run: |
          docker build -f apps/gateway-app/Dockerfile -t "${GATEWAY_IMAGE_NAME}:${{ github.sha }}" .
          docker build -f apps/audio-node-app/Dockerfile -t "${AUDIO_NODE_IMAGE_NAME}:${{ github.sha }}" .
          docker build -f apps/stock-node-app/Dockerfile -t "${STOCK_NODE_IMAGE_NAME}:${{ github.sha }}" .

      - name: Save Docker images to tar.gz
        run: |
          mkdir -p out
          docker save "${GATEWAY_IMAGE_NAME}:${{ github.sha }}" | gzip > "out/${GATEWAY_IMAGE_NAME}-${{ github.sha }}.tar.gz"
          docker save "${AUDIO_NODE_IMAGE_NAME}:${{ github.sha }}" | gzip > "out/${AUDIO_NODE_IMAGE_NAME}-${{ github.sha }}.tar.gz"
          docker save "${STOCK_NODE_IMAGE_NAME}:${{ github.sha }}" | gzip > "out/${STOCK_NODE_IMAGE_NAME}-${{ github.sha }}.tar.gz"

      - name: Create env file
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN || secrets.TOKEN }}
          DISCORD_DEV_GUILD_ID: ${{ secrets.DISCORD_DEV_GUILD_ID }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PO_TOKEN: ${{ secrets.YOUTUBE_PO_TOKEN }}
          YOUTUBE_VISITOR_DATA: ${{ secrets.YOUTUBE_VISITOR_DATA }}
          YOUTUBE_REMOTE_CIPHER_URL: ${{ secrets.YOUTUBE_REMOTE_CIPHER_URL }}
          YOUTUBE_REMOTE_CIPHER_PASSWORD: ${{ secrets.YOUTUBE_REMOTE_CIPHER_PASSWORD }}
          YOUTUBE_REMOTE_CIPHER_USER_AGENT: ${{ secrets.YOUTUBE_REMOTE_CIPHER_USER_AGENT }}
          RABBITMQ_USERNAME: ${{ secrets.RABBITMQ_USERNAME }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || 'stock' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || 'stock' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || vars.POSTGRES_PASSWORD || 'stock' }}
          APP_ENV: ${{ vars.APP_ENV || 'prod' }}
          OBSERVABILITY_ENABLED: ${{ vars.OBSERVABILITY_ENABLED || 'true' }}
          GRAFANA_IMAGE: ${{ vars.GRAFANA_IMAGE }}
          PROMETHEUS_IMAGE: ${{ vars.PROMETHEUS_IMAGE }}
          LOKI_IMAGE: ${{ vars.LOKI_IMAGE }}
          ALLOY_IMAGE: ${{ vars.ALLOY_IMAGE }}
          REDIS_EXPORTER_IMAGE: ${{ vars.REDIS_EXPORTER_IMAGE }}
          GRAFANA_ADMIN_USER: ${{ secrets.GRAFANA_ADMIN_USER || vars.GRAFANA_ADMIN_USER || 'admin' }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD || 'admin' }}
          GRAFANA_ANONYMOUS_ENABLED: ${{ vars.GRAFANA_ANONYMOUS_ENABLED || 'false' }}
          GRAFANA_ALERT_DEFAULT_RECEIVER: ${{ vars.GRAFANA_ALERT_DEFAULT_RECEIVER || 'observability-noop' }}
          GRAFANA_ALERT_NOOP_WEBHOOK_URL: ${{ vars.GRAFANA_ALERT_NOOP_WEBHOOK_URL || 'http://127.0.0.1:9/disabled' }}
          GRAFANA_ALERT_DISCORD_WEBHOOK_URL: ${{ secrets.GRAFANA_ALERT_DISCORD_WEBHOOK_URL || 'https://example.invalid/discord-webhook' }}
          GRAFANA_ALERT_DISCORD_AVATAR_URL: ${{ vars.GRAFANA_ALERT_DISCORD_AVATAR_URL }}
          GRAFANA_ALERT_DISCORD_USE_USERNAME: ${{ vars.GRAFANA_ALERT_DISCORD_USE_USERNAME || 'true' }}
        run: |
          mkdir -p out
          {
            printf "GATEWAY_IMAGE_NAME=%s\n" "${GATEWAY_IMAGE_NAME}"
            printf "GATEWAY_IMAGE_TAG=%s\n" "${{ github.sha }}"
            printf "AUDIO_NODE_IMAGE_NAME=%s\n" "${AUDIO_NODE_IMAGE_NAME}"
            printf "AUDIO_NODE_IMAGE_TAG=%s\n" "${{ github.sha }}"
            printf "STOCK_NODE_IMAGE_NAME=%s\n" "${STOCK_NODE_IMAGE_NAME}"
            printf "STOCK_NODE_IMAGE_TAG=%s\n" "${{ github.sha }}"
            printf "COMPOSE_PROJECT_NAME=%s\n" "${COMPOSE_PROJECT_NAME}"
            printf "APP_ENV=%s\n" "${APP_ENV}"
            printf "OBSERVABILITY_ENABLED=%s\n" "${OBSERVABILITY_ENABLED}"
            printf "DISCORD_TOKEN=%s\n" "${DISCORD_TOKEN}"
            printf "DISCORD_DEV_GUILD_ID=%s\n" "${DISCORD_DEV_GUILD_ID}"
            printf "YOUTUBE_REFRESH_TOKEN=%s\n" "${YOUTUBE_REFRESH_TOKEN}"
            printf "YOUTUBE_PO_TOKEN=%s\n" "${YOUTUBE_PO_TOKEN}"
            printf "YOUTUBE_VISITOR_DATA=%s\n" "${YOUTUBE_VISITOR_DATA}"
            printf "YOUTUBE_REMOTE_CIPHER_URL=%s\n" "${YOUTUBE_REMOTE_CIPHER_URL}"
            printf "YOUTUBE_REMOTE_CIPHER_PASSWORD=%s\n" "${YOUTUBE_REMOTE_CIPHER_PASSWORD}"
            printf "YOUTUBE_REMOTE_CIPHER_USER_AGENT=%s\n" "${YOUTUBE_REMOTE_CIPHER_USER_AGENT}"
            printf "YOUTUBE_OAUTH_INIT=false\n"
            printf "RABBITMQ_USERNAME=%s\n" "${RABBITMQ_USERNAME}"
            printf "RABBITMQ_PASSWORD=%s\n" "${RABBITMQ_PASSWORD}"
            printf "POSTGRES_DB=%s\n" "${POSTGRES_DB}"
            printf "POSTGRES_USER=%s\n" "${POSTGRES_USER}"
            printf "POSTGRES_PASSWORD=%s\n" "${POSTGRES_PASSWORD}"
            printf "GRAFANA_IMAGE=%s\n" "${GRAFANA_IMAGE}"
            printf "PROMETHEUS_IMAGE=%s\n" "${PROMETHEUS_IMAGE}"
            printf "LOKI_IMAGE=%s\n" "${LOKI_IMAGE}"
            printf "ALLOY_IMAGE=%s\n" "${ALLOY_IMAGE}"
            printf "REDIS_EXPORTER_IMAGE=%s\n" "${REDIS_EXPORTER_IMAGE}"
            printf "GRAFANA_ADMIN_USER=%s\n" "${GRAFANA_ADMIN_USER}"
            printf "GRAFANA_ADMIN_PASSWORD=%s\n" "${GRAFANA_ADMIN_PASSWORD}"
            printf "GRAFANA_ANONYMOUS_ENABLED=%s\n" "${GRAFANA_ANONYMOUS_ENABLED}"
            printf "GRAFANA_ALERT_DEFAULT_RECEIVER=%s\n" "${GRAFANA_ALERT_DEFAULT_RECEIVER}"
            printf "GRAFANA_ALERT_NOOP_WEBHOOK_URL=%s\n" "${GRAFANA_ALERT_NOOP_WEBHOOK_URL}"
            printf "GRAFANA_ALERT_DISCORD_WEBHOOK_URL=%s\n" "${GRAFANA_ALERT_DISCORD_WEBHOOK_URL}"
            printf "GRAFANA_ALERT_DISCORD_AVATAR_URL=%s\n" "${GRAFANA_ALERT_DISCORD_AVATAR_URL}"
            printf "GRAFANA_ALERT_DISCORD_USE_USERNAME=%s\n" "${GRAFANA_ALERT_DISCORD_USE_USERNAME}"
          } > out/.env.cicd

      - name: Prepare SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Ensure remote directory
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "${SSH_PORT}" -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p '${DEPLOY_DIR}/incoming' '${DEPLOY_DIR}/releases'"

      - name: Upload files
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "${SSH_PORT}" -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p '${DEPLOY_DIR}/incoming/ops' '${DEPLOY_DIR}/incoming/ops/observability'"

          scp -P "${SSH_PORT}" -i ~/.ssh/id_ed25519 \
            "out/${GATEWAY_IMAGE_NAME}-${{ github.sha }}.tar.gz" \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/incoming/"

          scp -P "${SSH_PORT}" -i ~/.ssh/id_ed25519 \
            "out/${AUDIO_NODE_IMAGE_NAME}-${{ github.sha }}.tar.gz" \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/incoming/"

          scp -P "${SSH_PORT}" -i ~/.ssh/id_ed25519 \
            "out/${STOCK_NODE_IMAGE_NAME}-${{ github.sha }}.tar.gz" \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/incoming/"

          scp -P "${SSH_PORT}" -i ~/.ssh/id_ed25519 \
            "out/.env.cicd" \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/incoming/.env.cicd"

          scp -P "${SSH_PORT}" -i ~/.ssh/id_ed25519 \
            "docker-compose.yml" \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/incoming/docker-compose.yml"

          scp -P "${SSH_PORT}" -i ~/.ssh/id_ed25519 \
            "deploy.sh" \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/deploy.sh"

          scp -P "${SSH_PORT}" -i ~/.ssh/id_ed25519 \
            "ops/replay-command-dlq.sh" \
            "ops/cleanup-legacy-deploy.sh" \
            "ops/smoke-check.sh" \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/incoming/ops/"

          scp -r -P "${SSH_PORT}" -i ~/.ssh/id_ed25519 \
            "ops/observability" \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/incoming/ops/"

      - name: Remote deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "${SSH_PORT}" -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "chmod +x '${DEPLOY_DIR}/deploy.sh' && DEPLOY_DIR='${DEPLOY_DIR}' COMPOSE_PROJECT_NAME='${COMPOSE_PROJECT_NAME}' bash '${DEPLOY_DIR}/deploy.sh' '${{ github.sha }}'"
