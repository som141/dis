name: Deploy Bot

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dis-deploy-main
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      APP_NAME: dis-bot
      DEPLOY_DIR: /home/ubuntu/dis-bot

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean test shadowJar --no-daemon

      - name: Build Docker image
        run: |
          docker build -t "${APP_NAME}:${{ github.sha }}" .

      - name: Save Docker image to tar.gz
        run: |
          mkdir -p out
          docker save "${APP_NAME}:${{ github.sha }}" | gzip > "out/${APP_NAME}-${{ github.sha }}.tar.gz"

      - name: Create env file
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: |
          mkdir -p out
          printf "TOKEN=%s\n" "${TOKEN}" > out/.env.cicd

      - name: Prepare SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          echo "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Ensure remote directory
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "${SSH_PORT}" -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p '${DEPLOY_DIR}/incoming'"

      - name: Upload files
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          scp -P "${SSH_PORT}" -i ~/.ssh/id_ed25519 \
            "out/${APP_NAME}-${{ github.sha }}.tar.gz" \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/incoming/"

          scp -P "${SSH_PORT}" -i ~/.ssh/id_ed25519 \
            "out/.env.cicd" \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/incoming/.env.cicd"

      - name: Remote deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "${SSH_PORT}" -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            "bash '${DEPLOY_DIR}/deploy.sh' '${{ github.sha }}'"