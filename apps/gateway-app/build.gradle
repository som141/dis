plugins {
    id 'java'
    id 'org.springframework.boot'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

dependencies {
    implementation platform('org.springframework.boot:spring-boot-dependencies:3.5.5')
    implementation project(':modules:common-core')
    implementation project(':modules:stock-core')

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

springBoot {
    mainClass = 'discordgateway.gateway.GatewayApplication'
}

bootJar {
    archiveFileName.set('gateway-app.jar')
}

jar {
    enabled = false
}
