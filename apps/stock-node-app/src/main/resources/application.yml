spring:
  application:
    name: stock-node-app
  datasource:
    url: jdbc:postgresql://${stock.storage.postgres-host}:${stock.storage.postgres-port}/${stock.storage.postgres-database}
    username: ${stock.storage.postgres-user}
    password: ${stock.storage.postgres-password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

server:
  port: ${HEALTH_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

app:
  node-name: ${APP_NODE_NAME:stock-node-1}

stock:
  messaging:
    enabled: ${STOCK_MESSAGING_ENABLED:true}
    listener-enabled: ${STOCK_MESSAGING_LISTENER_ENABLED:true}
    command-exchange: ${STOCK_COMMAND_EXCHANGE:stock.command.exchange}
    command-queue: ${STOCK_COMMAND_QUEUE:stock.command.queue}
    command-routing-key: ${STOCK_COMMAND_ROUTING_KEY:stock.command}
    command-result-exchange: ${STOCK_COMMAND_RESULT_EXCHANGE:stock.command.result.exchange}
    command-result-routing-key-prefix: ${STOCK_COMMAND_RESULT_ROUTING_KEY_PREFIX:stock.command.result.}
  storage:
    postgres-host: ${POSTGRES_HOST:postgres}
    postgres-port: ${POSTGRES_PORT:5432}
    postgres-database: ${POSTGRES_DB:stock}
    postgres-user: ${POSTGRES_USER:stock}
    postgres-password: ${POSTGRES_PASSWORD:stock}
    redis-host: ${REDIS_HOST:redis}
    redis-port: ${REDIS_PORT:6379}
  quote:
    provider: ${STOCK_QUOTE_PROVIDER:mock}
    default-market: ${STOCK_DEFAULT_MARKET:us}
    cache-ttl: ${STOCK_QUOTE_CACHE_TTL:60s}
    freshness: ${STOCK_QUOTE_FRESHNESS:45s}
    trade-freshness: ${STOCK_QUOTE_TRADE_FRESHNESS:45s}
    rank-freshness: ${STOCK_RANK_FRESHNESS:5m}
    lock-ttl: ${STOCK_QUOTE_LOCK_TTL:3s}
    lock-wait-timeout: ${STOCK_QUOTE_LOCK_WAIT_TIMEOUT:1s}
    lock-poll-interval: ${STOCK_QUOTE_LOCK_POLL_INTERVAL:25ms}
    provider-per-minute-limit: ${STOCK_PROVIDER_PER_MINUTE_LIMIT:60}
    provider-per-day-limit: ${STOCK_PROVIDER_PER_DAY_LIMIT:5000}
  market-data:
    enabled: ${STOCK_MARKET_DATA_ENABLED:true}
    market: ${STOCK_MARKET:US}
    refresh-fixed-delay-ms: ${STOCK_MARKET_REFRESH_DELAY_MS:20000}
    top-rank-limit: ${STOCK_TOP_RANK_LIMIT:10}
  finnhub:
    base-url: ${FINNHUB_BASE_URL:https://finnhub.io/api/v1}
    api-key: ${FINNHUB_API_KEY:}
