discord:
  token: ${DISCORD_TOKEN:${TOKEN:}}
  dev-guild-id: ${DISCORD_DEV_GUILD_ID:}

server:
  port: ${HEALTH_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name:unknown}
      node: ${APP_NODE_NAME:unknown}

logging:
  structured:
    format:
      console: ecs
    ecs:
      service:
        environment: ${APP_ENV:local}
        node-name: ${APP_NODE_NAME:unknown}
    json:
      stacktrace:
        root: first

messaging:
  rpc-timeout-ms: 10000
  command-exchange: music.command.exchange
  command-queue: music.command.queue
  command-routing-key: music.command
  command-dead-letter-exchange: music.command.dlx
  command-dead-letter-queue: music.command.dlq
  command-dead-letter-routing-key: music.command.dead
  command-dedup-ttl-ms: 300000

ops:
  command-dlq-replay-enabled: false
  command-dlq-replay-exit-after-run: false
  command-dlq-replay-max-messages: 100
  voice-idle-disconnect-enabled: true
  voice-idle-timeout: 5s

spring:
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        default-requeue-rejected: false
    template:
      mandatory: true
